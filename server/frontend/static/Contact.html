<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="/static/bootstrap.min.css">
    <style>
        /* Centering the frame only */
        .frame {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
            background-color: #f0f0f0;
        }
        /* Styling the content frame */
        .frame {
            width: 80%;
            border: 2px solid #007bff;
            border-radius: 10px;
            background-color: white;
            padding: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        /* Styling the image frame */
        #image-frame {
            height: 300px;
            background: url('/static/car.jpg') no-repeat center;
            background-size: cover;
            border-bottom: 2px solid #007bff;
        }
        /* Styling the contact info */
        #contact-info {
            padding: 20px;
        }
        #contact-info h1 {
            color: #007bff;
        }
        #contact-info p {
            font-size: 1.2em;
            line-height: 1.6;
        }
    </style>
</head>
<div>
  <nav class="navbar navbar-expand-lg navbar-light" style="background-color:darkturquoise; height: 1in;">
    <div class="container-fluid">
      <h2 style="padding-right: 5%;">Dealerships</h2>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarText" aria-controls="navbarText" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarText">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item">
            <a class="nav-link" style="font-size: larger;" aria-current="page" href="/">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" style="font-size: larger;" href="/about">About Us</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" style="font-size: larger;" href="/contact">Contact Us</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>
  
</div>
<body>
    <!-- Full-width Navigation Bar -->
    

    <!-- Main content frame -->
    <div class="frame">
        <!-- Upper image frame -->
       <div class="card" style="width: 30%;">
        <img class="card-img-top" src="https://www.copilotsearch.com/uploads/istock-1044328018.jpg" alt="Card image">
      </div>
        <!-- Lower contact info section -->
        <section id="contact-info">
            <h1>Contact Us</h1>
            <p><strong>Address:</strong> 123 Car Dealer Lane, Auto City, NA 32900</p>
            <p><strong>Phone:</strong> +1 (614) 123-4567</p>
            <p><strong>Email:</strong> contact@bestcars.com</p>
            <p>Our team is here to help you with any inquiries or issues. Reach out to us anytime!</p>
        </section>
    </div>
</body>
</html>
